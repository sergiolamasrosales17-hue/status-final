<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Generador STATUS_FINAL</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e1414">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="STATUS_FINAL">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg:#0e1414;
    --panel:#161f1f;
    --panel-2:#1c2828;
    --line:#2a3838;
    --text:#e9efe9;
    --muted:#8fa39f;
    --amber:#ff9d2e;
    --amber-dim:#4a3115;
    --green:#3ecf8e;
    --red:#ff5a5a;
    --mono: 'SFMono-Regular', Consolas, 'Courier New', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);}
  body{padding-bottom:120px;}

  .topbar{
    position:sticky;top:0;z-index:20;
    background:linear-gradient(180deg,#0e1414 80%,transparent);
    padding:18px 16px 10px;
  }
  .topbar .tag{
    font-family:var(--mono);font-size:11px;letter-spacing:.14em;
    color:var(--amber);text-transform:uppercase;
  }
  .topbar h1{
    margin:4px 0 2px;font-size:20px;font-weight:700;letter-spacing:-.01em;
  }
  .topbar .sub{color:var(--muted);font-size:12.5px;}

  .progress{
    display:flex;gap:3px;margin-top:12px;
  }
  .progress i{
    flex:1;height:3px;background:var(--line);border-radius:2px;overflow:hidden;
  }
  .progress i b{display:block;height:100%;width:0%;background:var(--amber);transition:width .25s;}

  .wrap{padding:6px 16px;max-width:640px;margin:0 auto;}

  .section{
    border:1px solid var(--line);
    border-radius:14px;
    margin-top:14px;
    background:var(--panel);
    overflow:hidden;
  }
  .section > .head{
    display:flex;align-items:center;gap:10px;
    padding:15px 16px;cursor:pointer;user-select:none;
  }
  .section > .head .num{
    font-family:var(--mono);font-size:11px;color:var(--amber);
    border:1px solid var(--amber-dim);background:var(--amber-dim);
    border-radius:6px;padding:3px 7px;flex-shrink:0;
  }
  .section > .head .title{font-weight:600;font-size:15px;flex:1;}
  .section > .head .hint{font-size:11.5px;color:var(--muted);}
  .section > .head .chev{color:var(--muted);transition:transform .2s;font-size:12px;}
  .section.open > .head .chev{transform:rotate(180deg);}
  .section > .body{
    display:none;padding:2px 16px 18px;
    border-top:1px dashed var(--line);
  }
  .section.open > .body{display:block;}

  label{
    display:block;font-size:12px;color:var(--muted);
    margin:14px 0 6px;letter-spacing:.02em;
  }
  input[type=text],input[type=number],select,textarea{
    width:100%;background:var(--panel-2);border:1px solid var(--line);
    color:var(--text);border-radius:9px;padding:11px 12px;font-size:15px;
    font-family:var(--sans);
  }
  textarea{font-family:var(--mono);font-size:13px;resize:vertical;}
  input:focus,select:focus,textarea:focus{
    outline:none;border-color:var(--amber);
  }
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

  .frase-preview{
    margin-top:8px;font-family:var(--mono);font-size:12px;color:var(--green);
    background:#0e1c17;border:1px dashed #235c42;border-radius:8px;padding:9px 10px;
    line-height:1.5;
  }

  .registro{
    border:1px solid var(--line);border-radius:11px;padding:12px 12px 6px;
    margin-top:12px;background:#111a1a;position:relative;
  }
  .registro .rm{
    position:absolute;top:8px;right:8px;background:none;border:none;
    color:var(--red);font-size:13px;cursor:pointer;padding:4px 8px;
  }
  .registro .rlabel{
    font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.08em;
  }

  .add-btn{
    width:100%;margin-top:14px;padding:12px;border-radius:9px;
    border:1px dashed var(--amber-dim);background:transparent;color:var(--amber);
    font-size:13.5px;font-weight:600;cursor:pointer;
  }
  .add-btn:active{background:var(--amber-dim);}

  .check-row{
    display:flex;align-items:center;gap:9px;margin-top:14px;
    background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:11px 12px;
  }
  .check-row input{width:18px;height:18px;accent-color:var(--amber);}
  .check-row span{font-size:13.5px;}

  .bar{
    position:fixed;bottom:0;left:0;right:0;z-index:30;
    background:linear-gradient(0deg,#0e1414 70%,transparent);
    padding:14px 16px 20px;
  }
  .bar .inner{max-width:640px;margin:0 auto;display:flex;gap:10px;}
  .btn{
    flex:1;padding:15px;border-radius:12px;border:none;font-size:14.5px;font-weight:700;
    cursor:pointer;
  }
  .btn-main{background:var(--amber);color:#221200;}
  .btn-ghost{background:var(--panel-2);color:var(--text);border:1px solid var(--line);flex:0 0 52px;font-size:19px;}

  .modal-bg{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:40;
    align-items:flex-end;
  }
  .modal-bg.open{display:flex;}
  .modal{
    background:var(--panel);width:100%;max-height:85vh;overflow:auto;
    border-radius:18px 18px 0 0;padding:18px 16px 26px;
    border-top:1px solid var(--line);
  }
  .modal h3{margin:0 0 4px;font-size:16px;}
  .modal .muted{color:var(--muted);font-size:12px;margin-bottom:12px;}
  .modal-actions{display:flex;gap:10px;margin-top:14px;}
  .modal-actions .btn{flex:1;}
  .toast{
    position:fixed;top:14px;left:50%;transform:translateX(-50%);
    background:var(--green);color:#062416;padding:10px 18px;border-radius:20px;
    font-size:13px;font-weight:700;z-index:60;display:none;
  }
</style>
</head>
<body>

<div class="toast" id="toast">Copiado ✓</div>

<div class="topbar">
  <div class="tag">CE · AUTOMATIZADOR DE FIBRA</div>
  <h1>Generador de STATUS_FINAL</h1>
  <div class="sub">Selecciona los datos — no escribas texto libre en los campos críticos.</div>
  <div class="progress" id="progress"></div>
</div>

<div class="wrap" id="form"></div>

<div class="bar">
  <div class="inner">
    <button class="btn btn-ghost" onclick="resetForm()" title="Reiniciar">↺</button>
    <button class="btn btn-main" onclick="generar()">Generar STATUS_FINAL</button>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>STATUS_FINAL generado</h3>
    <div class="muted">Mismo formato de siempre — listo para copiar y enviar.</div>
    <textarea id="salida" rows="16" readonly></textarea>
    <div class="modal-actions">
      <button class="btn btn-ghost" style="flex:0 0 52px" onclick="cerrarModal()">✕</button>
      <button class="btn btn-main" onclick="copiar()">Copiar texto</button>
    </div>
    <div class="modal-actions" id="shareRow" style="display:none">
      <button class="btn btn-main" style="background:var(--green);color:#06241a" onclick="compartir()">Compartir (WhatsApp, etc.)</button>
    </div>
  </div>
</div>

<script>
/* ---------------------------------------------------------------------
   Config
--------------------------------------------------------------------- */
const PISOS_MAX = 30;
const pisoOptions = () => {
  let o = `<option value="">-</option>`;
  o += `<option value="SOTANO">SÓTANO</option>`;
  for(let i=1;i<=PISOS_MAX;i++) o += `<option value="PISO ${i}">PISO ${i}</option>`;
  o += `<option value="AZOTEA">AZOTEA</option>`;
  return o;
};
const outOptions = (empty=false) => {
  let o = empty ? `<option value="">-</option>` : "";
  for(let i=1;i<=8;i++) o += `<option value="${i}">${i}</option>`;
  return o;
};

/* ---------------------------------------------------------------------
   Estado de registros repetibles
--------------------------------------------------------------------- */
let mufasIntervenidas = [];
let mufasInstaladas = [];
let naps = [];
let tendidos = [];
let seq = 1;

function nuevoId(){ return seq++; }

/* ---------------------------------------------------------------------
   Render principal
--------------------------------------------------------------------- */
const secciones = [
  {id:'proyecto', num:'01', title:'Datos del proyecto', hint:'obligatorio'},
  {id:'nodo', num:'02', title:'Jumpeo en nodo', hint:'opcional'},
  {id:'tendido', num:'03', title:'Tendido de fibra óptica', hint:'opcional'},
  {id:'mufasint', num:'04', title:'Mufas intervenidas', hint:'si aplica'},
  {id:'mufasnue', num:'05', title:'Mufas instaladas (nuevas)', hint:'si aplica'},
  {id:'naps', num:'06', title:'NAPs habilitadas', hint:'si aplica'},
  {id:'ferreteria', num:'07', title:'Ferretería y materiales', hint:'opcional'},
  {id:'terceros', num:'08', title:'Infraestructura de terceros', hint:'opcional'},
  {id:'final', num:'09', title:'Trabajos adicionales / cierre', hint:'obligatorio'},
];

function render(){
  const form = document.getElementById('form');
  form.innerHTML = secciones.map(s => `
    <div class="section" id="sec-${s.id}">
      <div class="head" onclick="toggle('${s.id}')">
        <div class="num">${s.num}</div>
        <div class="title">${s.title}</div>
        <div class="hint">${s.hint}</div>
        <div class="chev">▾</div>
      </div>
      <div class="body">${bodyFor(s.id)}</div>
    </div>
  `).join('');

  document.getElementById('progress').innerHTML =
    secciones.map(()=>`<i><b></b></i>`).join('');

  document.getElementById('sec-proyecto').classList.add('open');
  attachFusionPreviews();
  updateProgress();
}

function toggle(id){
  document.getElementById('sec-'+id).classList.toggle('open');
}

/* ---------------------------------------------------------------------
   Cuerpos de cada sección
--------------------------------------------------------------------- */
function bodyFor(id){
  switch(id){
    case 'proyecto': return `
      <label>ID Proyecto *</label>
      <input type="text" id="p_id" inputmode="numeric" placeholder="Ej: 16663">
      <label>Nombre del proyecto *</label>
      <input type="text" id="p_nombre" placeholder="Ej: EDIFICIO PARKTOWN">
      <label>Nodo</label>
      <input type="text" id="p_nodo" placeholder="Ej: ANGAMOS">
      <div class="row2">
        <div><label>Torres</label><input type="number" id="p_torres" min="1" value="1"></div>
        <div><label>Montantes</label><input type="number" id="p_montantes" min="1" value="1"></div>
      </div>
      <div class="row2">
        <div><label>Pisos</label><input type="number" id="p_pisos" min="1"></div>
        <div><label>HP</label><input type="number" id="p_hp" min="0"></div>
      </div>
      <label>Coordenadas</label>
      <input type="text" id="p_coord" placeholder="-12.0976S -77.0422W">
      <label>Distrito</label>
      <input type="text" id="p_distrito">
      <label>Dirección</label>
      <input type="text" id="p_direccion">
      <div class="row2">
        <div><label>Fecha inicio</label><input type="text" id="p_fini" placeholder="DD-MM-AAAA"></div>
        <div><label>Fecha fin</label><input type="text" id="p_ffin" placeholder="DD-MM-AAAA"></div>
      </div>
      <label>Supervisor WIN</label>
      <input type="text" id="p_sup">
      <label>Contrata</label>
      <input type="text" id="p_contrata" value="DATANTENNA">
      <label>Cuadrilla</label>
      <input type="text" id="p_cuadrilla" placeholder="Ej: PEXT-1">
    `;

    case 'nodo': return `
      <label>Nodo (jumpeo)</label>
      <input type="text" id="j_nodo">
      <label>Fecha</label>
      <input type="text" id="j_fecha" placeholder="DD-MM-AAAA">
      <div class="row2">
        <div><label>Patch panel</label><input type="text" id="j_patch"></div>
        <div><label>Hilo</label><input type="text" id="j_hilo"></div>
      </div>
      <div class="row2">
        <div><label>ODF</label><input type="text" id="j_odf"></div>
        <div><label>Patch cord (tipo y mts)</label><input type="text" id="j_cord"></div>
      </div>
      <div class="row2">
        <div><label>Tipo de acceso</label><input type="text" id="j_acceso"></div>
        <div><label>N° visitas al nodo</label><input type="number" id="j_visitas" min="0"></div>
      </div>
    `;

    case 'tendido': return `
      <div id="lista-tendidos"></div>
      <button class="add-btn" onclick="agregarTendido()">+ Agregar tipo de fibra</button>
    `;

    case 'mufasint': return `
      <div id="lista-mufasint"></div>
      <button class="add-btn" onclick="agregarMufaInt()">+ Agregar mufa intervenida</button>
    `;

    case 'mufasnue': return `
      <div id="lista-mufasnue"></div>
      <button class="add-btn" onclick="agregarMufaNueva()">+ Agregar mufa nueva</button>
    `;

    case 'naps': return `
      <div id="lista-naps"></div>
      <button class="add-btn" onclick="agregarNap()">+ Agregar NAP</button>
    `;

    case 'ferreteria': return `
      <div class="row3">
        <div><label>Canaleta</label><input type="number" id="f_canaleta" min="0"></div>
        <div><label>Reductor</label><input type="number" id="f_reductor" min="0"></div>
        <div><label>Brazo ext.</label><input type="number" id="f_brazo" min="0"></div>
      </div>
      <div class="row3">
        <div><label>Cruceta</label><input type="number" id="f_cruceta" min="0"></div>
        <div><label>Preformados</label><input type="number" id="f_preform" min="0"></div>
        <div><label>Clevis</label><input type="number" id="f_clevis" min="0"></div>
      </div>
      <div class="row3">
        <div><label>Cable acerado (mt)</label><input type="number" id="f_acerado" min="0"></div>
        <div><label>Chapa tensora</label><input type="number" id="f_chapa" min="0"></div>
        <div><label>Etiquetas</label><input type="number" id="f_etiq" min="0"></div>
      </div>
      <div class="row2">
        <div><label>Hebillas</label><input type="number" id="f_hebillas" min="0"></div>
        <div><label>C.bandit (mt)</label><input type="number" id="f_cbandit" min="0"></div>
      </div>
      <label>Caja metálica (material planta interna)</label>
      <input type="text" id="f_caja">
      <label>Ducto (tipo y metraje)</label>
      <input type="text" id="f_ducto">
    `;

    case 'terceros': return `
      <div class="row2">
        <div><label>Postes</label><input type="number" id="tc_postes" min="0"></div>
        <div><label>Operador</label><input type="text" id="tc_operador"></div>
      </div>
      <label>Canalizado (detalle)</label>
      <input type="text" id="tc_canal" placeholder="Ej: 15 MT desde poste hasta la mecha del predio">
    `;

    case 'final': return `
      <label>Trabajos adicionales</label>
      <textarea id="fin_adicionales" rows="3" placeholder="- (sin observaciones)"></textarea>
      <div class="check-row">
        <input type="checkbox" id="fin_habilitado" checked>
        <span>PREDIO_PEXT_HABILITADO</span>
      </div>
    `;
  }
}

/* ---------------------------------------------------------------------
   Registros repetibles: TENDIDO DE FIBRA ÓPTICA (varios tipos a la vez)
--------------------------------------------------------------------- */
function agregarTendido(){
  tendidos.push({id:nuevoId(), tipo:'', ext:'', int:''});
  renderTendidos();
}
function quitarTendido(id){
  tendidos = tendidos.filter(t=>t.id!==id);
  renderTendidos();
}
function renderTendidos(){
  const cont = document.getElementById('lista-tendidos');
  if(!cont) return;
  cont.innerHTML = tendidos.map((t,i)=>`
    <div class="registro">
      <button class="rm" onclick="quitarTendido(${t.id})">Quitar ✕</button>
      <div class="rlabel">FIBRA ${i+1}</div>
      <label>Tipo de fibra</label>
      <select onchange="tendidos.find(x=>x.id===${t.id}).tipo=this.value">
        <option value="">-</option>
        ${['4H','12H','24H','48H','96H'].map(o=>`<option ${t.tipo===o?'selected':''}>${o}</option>`).join('')}
      </select>
      <div class="row2">
        <div><label>Metros externo</label><input type="number" min="0" value="${t.ext}"
          oninput="tendidos.find(x=>x.id===${t.id}).ext=this.value"></div>
        <div><label>Metros interno</label><input type="number" min="0" value="${t.int}"
          oninput="tendidos.find(x=>x.id===${t.id}).int=this.value"></div>
      </div>
    </div>
  `).join('');
}

/* ---------------------------------------------------------------------
   Registros repetibles: MUFAS INTERVENIDAS (SDS/OUT)
--------------------------------------------------------------------- */
function agregarMufaInt(){
  mufasIntervenidas.push({id:nuevoId(), tipo:'DOMO', codigo:'', modo:'splitter', sds:'', hilo:'', hiloEntrada:'', hiloSalida:'', fibraEntrada:'', fibraSalida:'', punta:'', empalme:'', otdr:''});
  renderMufasInt();
}
function quitarMufaInt(id){
  mufasIntervenidas = mufasIntervenidas.filter(m=>m.id!==id);
  renderMufasInt();
}
function renderMufasInt(){
  const cont = document.getElementById('lista-mufasint');
  cont.innerHTML = mufasIntervenidas.map((m,i)=>`
    <div class="registro">
      <button class="rm" onclick="quitarMufaInt(${m.id})">Quitar ✕</button>
      <div class="rlabel">MUFA INTERVENIDA ${i+1}</div>
      <label>Tipo</label>
      <select onchange="mufasIntervenidas.find(x=>x.id===${m.id}).tipo=this.value">
        ${['DOMO','FOSC','HERMETICA','CIERRE'].map(o=>`<option ${m.tipo===o?'selected':''}>${o}</option>`).join('')}
      </select>
      <label>Código de mufa (tal como está en el Cuadro de Empalme)</label>
      <input type="text" placeholder="WN-XXX-DM-XXXXXXX" value="${m.codigo}"
        oninput="mufasIntervenidas.find(x=>x.id===${m.id}).codigo=this.value.toUpperCase(); this.value=this.value.toUpperCase(); actualizarFrase(${m.id})">

      <label>¿Qué tipo de empalme se hizo en esta mufa?</label>
      <select onchange="mufasIntervenidas.find(x=>x.id===${m.id}).modo=this.value; renderMufasInt()">
        <option value="splitter" ${m.modo==='splitter'?'selected':''}>Mufa TOMA DE SERVICIO (splitter, sale un SDS/OUT hacia una NAP)</option>
        <option value="recto" ${m.modo==='recto'?'selected':''}>Mufa DE CONTINUIDAD (empalme recto entre dos cables, sin splitter)</option>
      </select>

      ${m.modo === 'splitter' ? `
        <div class="row2">
          <div>
            <label>SDS usado (= OUT del splitter)</label>
            <select onchange="mufasIntervenidas.find(x=>x.id===${m.id}).sds=this.value; actualizarFrase(${m.id})">
              ${outOptions(true).replace(`value="${m.sds}"`, `value="${m.sds}" selected`)}
            </select>
          </div>
          <div>
            <label>Hilo propio fusionado (H)</label>
            <select onchange="mufasIntervenidas.find(x=>x.id===${m.id}).hilo=this.value; actualizarFrase(${m.id})">
              ${outOptions(true).replace(`value="${m.hilo}"`, `value="${m.hilo}" selected`)}
            </select>
          </div>
        </div>
        <div class="frase-preview" id="frase-${m.id}">Selecciona SDS e hilo para ver la frase generada…</div>
      ` : `
        <div class="row2">
          <div><label>Hilo de ENTRADA</label><input type="number" min="1" placeholder="Ej: 73" value="${m.hiloEntrada}"
            oninput="mufasIntervenidas.find(x=>x.id===${m.id}).hiloEntrada=this.value; actualizarFrase(${m.id})"></div>
          <div><label>Hilo de SALIDA</label><input type="number" min="1" placeholder="Ej: 9" value="${m.hiloSalida}"
            oninput="mufasIntervenidas.find(x=>x.id===${m.id}).hiloSalida=this.value; actualizarFrase(${m.id})"></div>
        </div>
        <div class="row2">
          <div><label>Fibra de entrada</label>
            <select onchange="mufasIntervenidas.find(x=>x.id===${m.id}).fibraEntrada=this.value; actualizarFrase(${m.id})">
              <option value="">-</option>
              ${['4H','12H','24H','48H','96H'].map(o=>`<option ${m.fibraEntrada===o?'selected':''}>${o}</option>`).join('')}
            </select>
          </div>
          <div><label>Fibra de salida</label>
            <select onchange="mufasIntervenidas.find(x=>x.id===${m.id}).fibraSalida=this.value; actualizarFrase(${m.id})">
              <option value="">-</option>
              ${['4H','12H','24H','48H','96H'].map(o=>`<option ${m.fibraSalida===o?'selected':''}>${o}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="frase-preview" id="frase-${m.id}">Completa los hilos para ver la frase generada…</div>
      `}

      <div class="row2">
        <div><label>Punta</label><input type="number" min="0" value="${m.punta}"
          oninput="mufasIntervenidas.find(x=>x.id===${m.id}).punta=this.value"></div>
        <div><label>Total empalmes</label><input type="number" min="0" value="${m.empalme}"
          oninput="mufasIntervenidas.find(x=>x.id===${m.id}).empalme=this.value"></div>
      </div>
      <label>Medición OTDR realizada en esta mufa</label>
      <input type="number" min="0" placeholder="Ej: 1" value="${m.otdr}"
        oninput="mufasIntervenidas.find(x=>x.id===${m.id}).otdr=this.value">
    </div>
  `).join('');
  mufasIntervenidas.forEach(m => actualizarFrase(m.id));
}
function actualizarFrase(id){
  const m = mufasIntervenidas.find(x=>x.id===id);
  const el = document.getElementById('frase-'+id);
  if(!el) return;
  if(m.modo === 'splitter'){
    el.textContent = (m.sds && m.hilo)
      ? `"SE FUSIONO SDS H${m.sds} CON H${m.hilo} EN DIRECCIÓN AL PREDIO"`
      : 'Selecciona SDS e hilo para ver la frase generada…';
  } else {
    el.textContent = (m.hiloEntrada && m.hiloSalida)
      ? `"SE EMPALMA HILO ${m.hiloEntrada}${m.fibraEntrada ? ' DE FIBRA '+m.fibraEntrada : ''} CON HILO ${m.hiloSalida}${m.fibraSalida ? ' DE FIBRA '+m.fibraSalida : ''} PARA DAR CONTINUIDAD"`
      : 'Completa los hilos para ver la frase generada…';
  }
}

      <select onchange="mufasInstaladas.find(x=>x.id===${m.id}).tipo=this.value">

      <label>Código de la mufa nueva</label>
      <input type="text" placeholder="WN-XXX-DM-XXXXXXX" value="${m.codigo}"

      <select onchange="mufasInstaladas.find(x=>x.id===${m.id}).origenTipo=this.value; renderMufasNue()">

        oninput="mufasInstaladas.find(x=>x.id===${m.id}).origenCodigo=this.value.toUpperCase(); this.value=this.value.toUpperCase()">
      ${m.origenTipo==='reserva' ? `
        <label>Hilos de la reserva usados (ej: H5 H6 H7)</label>
        <input type="text" placeholder="H5 H6 H7" value="${m.hilosReserva}"

      <div class="row2">

        <div>

            <option ${m.ubicacion==='POSTE EXTERNO'?'selected':''}>POSTE EXTERNO</option>

function attachFusionPreviews(){
  renderTendidos(); renderMufasInt(); renderMufasNue(); renderNaps();

/* ---------------------------------------------------------------------
   Progreso visual
--------------------------------------------------------------------- */
function updateProgress(){
  const bars = document.querySelectorAll('#progress i b');
  const filled = document.getElementById('p_id') && document.getElementById('p_id').value ? 1 : 0;
  // Simplemente refleja avance aproximado por secciones abiertas/rellenas
  secciones.forEach((s,i)=>{
    if(!bars[i]) return;
    bars[i].style.width = seccionTieneDatos(s.id) ? '100%' : '15%';
  });
}
function seccionTieneDatos(id){
  if(id==='proyecto') return !!(document.getElementById('p_id') && document.getElementById('p_id').value);
  if(id==='tendido') return tendidos.length>0;
  if(id==='mufasint') return mufasIntervenidas.length>0;
  if(id==='mufasnue') return mufasInstaladas.length>0;
  if(id==='naps') return naps.length>0;
  return false;
}
document.addEventListener('input', updateProgress);

/* ---------------------------------------------------------------------
   Generación del texto STATUS_FINAL (mismo formato que hoy)
--------------------------------------------------------------------- */
function v(id){ const el = document.getElementById(id); return el ? el.value.trim() : ''; }

function generar(){
  if(!v('p_id')){
    alert('Falta el ID del proyecto (sección 1).');
    toggle('proyecto'); document.getElementById('sec-proyecto').scrollIntoView({behavior:'smooth'});
    return;
  }

  let L = [];
  L.push('STATUS_FINAL_PEXT');
  L.push('');
  L.push(`ID PROYECTO:${v('p_id')} ${v('p_nombre')}`);
  L.push(`NODO: ${v('p_nodo')}`);
  L.push(`COORDENADAS:${v('p_coord')}`);
  L.push(`DISTRITO:${v('p_distrito')}`);
  L.push(`TORRES:${v('p_torres')}`);
  L.push(`MONTANTES:${v('p_montantes')}`);
  L.push(`PISOS:${v('p_pisos')}`);
  L.push(`HP:${v('p_hp')}`);
  L.push(`DIRECCIÓN:${v('p_direccion')}`);
  L.push(`FECHA INICIO:${v('p_fini')}`);
  L.push(`FECHA FIN:${v('p_ffin')}`);
  L.push(`SUPERVISOR WIN: ${v('p_sup')}`);
  L.push(`CONTRATA: ${v('p_contrata')}`);
  L.push(`CUADRILLA: ${v('p_cuadrilla')}`);
  L.push('');
  L.push('--------------------------------');
  L.push('');
  L.push('JUMPEO EN NODO');
  L.push('');
  L.push(`*NODO: ${v('j_nodo')}`);
  L.push(`*FECHA:${v('j_fecha')}`);
  L.push(`*PATCH PANNEL:${v('j_patch')}`);
  L.push(`*HILO:${v('j_hilo')}`);
  L.push(`*ODF:${v('j_odf')}`);
  L.push(`*PATCH CORD (TIPO Y MTS):${v('j_cord')}`);
  L.push(`*TIPO DE ACCESO:${v('j_acceso')}`);
  L.push(`*NRO DE VISITAS A NODO:${v('j_visitas')}`);
  L.push('');
  L.push('--------------------------------');
  L.push('');
  L.push('TENDIDO FIBRA OPTICA:');
  L.push('');
  if(tendidos.length===0){
    L.push('*TIPO DE FIBRA:');
    L.push('*M.EXTERNO: ');
    L.push('*M.INTERNO: ');
  } else {
    tendidos.forEach((t,i)=>{
      L.push(`*TIPO DE FIBRA:${t.tipo}`);
      L.push(`*M.EXTERNO: ${t.ext} MT`);
      L.push(`*M.INTERNO: ${t.int} MT`);
      if(i < tendidos.length-1) L.push('');
    });
  }
  L.push('');
  L.push(`*TOTAL DE F.O.:${tendidos.reduce((a,t)=>a+(Number(t.ext)||0)+(Number(t.int)||0),0)} MT`);
  L.push('');
  L.push('--------------------------------');
  L.push('');
  L.push('MUFAS INTERVENIDAS:');
  L.push('');
  if(mufasIntervenidas.length===0){
    L.push('*TIPO:'); L.push('*CÓDIGO:'); L.push('*FUSIÓN Y ELEMENTO INSTALADO:');
    L.push('*PUNTA: '); L.push('*SANGRADO: '); L.push('*TOTAL EMPALMES: ');
  } else {
    mufasIntervenidas.forEach((m,i)=>{
      L.push(`*TIPO:${m.tipo}`);
      L.push(`*CÓDIGO: ${m.codigo}`);
      L.push('*FUSIÓN Y ELEMENTO INSTALADO:');
      if(m.modo === 'splitter'){
        L.push(m.sds && m.hilo ? `SE FUSIONO SDS H${m.sds} CON H${m.hilo} EN DIRECCIÓN AL PREDIO` : '');
      } else {
        L.push((m.hiloEntrada && m.hiloSalida)
          ? `SE EMPALMA HILO ${m.hiloEntrada}${m.fibraEntrada ? ' DE FIBRA '+m.fibraEntrada : ''} CON HILO ${m.hiloSalida}${m.fibraSalida ? ' DE FIBRA '+m.fibraSalida : ''} PARA DAR CONTINUIDAD`
          : '');
      }
      L.push(`*PUNTA: ${m.punta}`);
      L.push(`*SANGRADO: `);
      L.push(`*TOTAL EMPALMES: ${m.empalme}`);
      L.push(`*MEDICION OTDR: ${m.otdr}`);
      if(i < mufasIntervenidas.length-1) L.push('');
    });
  }
  L.push('');
  L.push(`TOTAL DE MEDICIONES: ${mufasIntervenidas.reduce((a,m)=>a+(Number(m.otdr)||0),0)}`);
  L.push('');
  L.push('--------------------------------');
  L.push('');
  L.push('MUFAS INSTALADAS:');
  L.push('');
  if(mufasInstaladas.length===0){
    L.push('*TIPO:'); L.push('*CÓDIGO:'); L.push('*FUSIÓN Y ELEMENTO INSTALADO:');
    L.push('*PUNTA: '); L.push('*SANGRADO: '); L.push('*UBICACIÓN: ');
  } else {
    mufasInstaladas.forEach((m,i)=>{
      L.push(`*TIPO:${m.tipo}`);
      L.push(`*CÓDIGO: ${m.codigo}`);
      L.push('*FUSIÓN Y ELEMENTO INSTALADO:');
      if(m.origenTipo==='reserva'){
        L.push(`MUFA EXTERNA PROYECTADA DE LA RESERVA DEL CABLE ${m.origenCodigo}${m.hilosReserva ? ', SE FUSIONO '+m.hilosReserva : ''}`);
      } else {
        L.push(`MUFA PROYECTADA DESDE ${m.origenCodigo}`);
      }
      L.push(`*PUNTA: ${m.punta}`);
      L.push(`*SANGRADO: `);
      L.push(`*UBICACIÓN: ${m.ubicacion}`);
      if(i < mufasInstaladas.length-1) L.push('');
    });
  }
  L.push('');
  L.push('--------------------------------');
  L.push('');
  L.push(`NAPS HABILITADAS:${naps.length || ''}`);
  L.push('');
  if(naps.length===0){
    L.push('*TIPO:'); L.push('*CÓDIGO:'); L.push('*UBICACIÓN:'); L.push('*POTENCIA:');
  } else {
    naps.forEach((n,i)=>{
      L.push(`*TIPO: ${n.tipo}`);
      L.push(`*CÓDIGO: ${n.codigo}`);
      L.push(`*UBICACIÓN: ${n.ubicacion}`);
      L.push(`*POTENCIA:${n.potencia}`);
      if(i < naps.length-1) L.push('');
    });
  }
  L.push('');
  L.push(`TOTAL NAPS INSTALADAS:${naps.length}`);
  L.push('');
  L.push('PREPARACIÓN');
  L.push(`*EN PUNTA:${naps.reduce((a,n)=>a+(Number(n.punta)||0),0) || ''}`);
  L.push(`*EN SANGRADO:${naps.reduce((a,n)=>a+(Number(n.sangrado)||0),0) || ''}`);
  L.push(`*TOTAL DE EMPALMES:${naps.reduce((a,n)=>a+(Number(n.punta)||0)+(Number(n.sangrado)||0),0) || ''}`);
  L.push('');
  L.push('--------------------------------');
  L.push('');
  L.push('FERRETERÍA:');
  L.push('');
  L.push(`*CANALETA:${v('f_canaleta')}`);
  L.push(`*REDUCTOR:${v('f_reductor')}`);
  L.push(`*BRAZO EXTENSOR:${v('f_brazo')}`);
  L.push(`*CRUCETA:${v('f_cruceta')}`);
  L.push(`*PREFORMADOS:${v('f_preform')}`);
  L.push(`*PORTA LINEA(CLEVIS):${v('f_clevis')}`);
  L.push(`*CABLE ACERADO:${v('f_acerado')}`);
  L.push(`*CHAPA TENSORA:${v('f_chapa')}`);
  L.push(`*ETIQUETAS:${v('f_etiq')}`);
  L.push(`*HEBILLAS:${v('f_hebillas')}`);
  L.push(`*C.BANDI:${v('f_cbandit')} MT`);
  L.push('');
  L.push('--------------------------------');
  L.push('');
  L.push('MATERIAL PLANTA INTERNA');
  L.push('');
  L.push(`*CAJA METÁLICA: ${v('f_caja')}`);
  L.push(`*DUCTO(TIPO Y METRAJE): ${v('f_ducto')}`);
  L.push('');
  L.push('--------------------------------');
  L.push('');
  L.push('INFRAESTRUCTURA DE TERCEROS:');
  L.push('');
  L.push(`POSTES: ${v('tc_postes')}`);
  L.push('');
  L.push(`CANALIZADO: ${v('tc_canal')}`);
  L.push('');
  L.push(`OPERADOR: ${v('tc_operador')}`);
  L.push('');
  L.push('');
  L.push('--------------------------------');
  L.push('');
  L.push('TRABAJOS ADICIONALES:');
  L.push(v('fin_adicionales') || '-');
  L.push('');
  if(document.getElementById('fin_habilitado').checked){
    L.push('PREDIO_PEXT_HABILITADO');
    L.push('');
  }
  L.push('--------------------------------');

  document.getElementById('salida').value = L.join('\n');
  document.getElementById('modalBg').classList.add('open');
  document.getElementById('shareRow').style.display = (navigator.share ? 'flex' : 'none');
}

function cerrarModal(){ document.getElementById('modalBg').classList.remove('open'); }

function copiar(){
  const ta = document.getElementById('salida');
  ta.select(); ta.setSelectionRange(0, 999999);
  navigator.clipboard && navigator.clipboard.writeText(ta.value);
  document.execCommand && document.execCommand('copy');
  const t = document.getElementById('toast');
  t.style.display='block'; setTimeout(()=>t.style.display='none', 1400);
}

function compartir(){
  const texto = document.getElementById('salida').value;
  if(navigator.share){
    navigator.share({title:'STATUS_FINAL', text:texto}).catch(()=>{});
  }
}

function resetForm(){
  if(!confirm('¿Reiniciar el formulario? Se perderán los datos no generados.')) return;
  mufasIntervenidas = []; mufasInstaladas = []; naps = []; tendidos = [];
  render();
}

render();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
